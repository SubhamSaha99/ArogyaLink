syntax = "proto3";

package auth;

service AuthService {
  rpc HealthInstituteRegistration(HealthInstituteRegReq)
  returns (HealthInstituteRegRes);

  rpc HealthInstituteLogin(HealthInstituteLoginReq)
  returns (HealthInstituteLoginRes);

  rpc CreateDoctorAuth(DoctorAuthReq)
  returns (DoctorRegistrationRes);

  rpc CompensateDoctorRegistration(CompensateDoctorRegistrationReq)
  returns (CompensateDoctorRegistrationRes);

}

message HealthInstituteRegReq {
  int32  healthInstituteType = 1;
  string email               = 2;
  string healthInstituteName = 3;
  string password            = 4;
}

message HealthInstituteRegRes {
  string healthInstituteId = 1;
}

message HealthInstituteLoginReq {
  optional string healthInstituteId = 1;
  optional string email             = 2;
  string          password          = 3;
  string          requestIp         = 4;
}

message HealthInstituteLoginRes {
  string healthInstituteId   = 1;
  string healthInstituteName = 2;
  string healthInstituteType = 3;
  string email               = 4;
  string token               = 5;
}

message DoctorAuthReq {
  string email    = 1;
  string mobile   = 2;
  string password = 3;
}

message DoctorRegistrationRes {
  string doctorId = 1;
}

message CompensateDoctorRegistrationReq {
  string doctorId = 1;
}

message CompensateDoctorRegistrationRes {
  bool success = 1;
}